<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>HGB VN • Roblox Script no Telegram Sync)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: radial-gradient(circle at 20% 10%, #0a0c1a, #02030a); min-height: 100vh; font-family: 'Inter', system-ui, sans-serif; color: #eef3ff; overflow-x: hidden; }
    .login-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; padding: 1.5rem; z-index: 100; }
    .login-card { width: 100%; max-width: 400px; padding: 2rem 1.5rem 2.2rem; text-align: center; background: rgba(8, 12, 28, 0.85); backdrop-filter: blur(20px); border-radius: 2rem; border: 1px solid rgba(255, 180, 60, 0.3); box-shadow: 0 25px 45px rgba(0,0,0,0.5); animation: fadeInUp 0.3s ease; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .monkey-logo { font-size: 4rem; filter: drop-shadow(0 0 8px #ffa600); margin-bottom: 0.5rem; }
    .brand-name { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #FFDA7C, #FF9F2E); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .brand-sub { font-size: 0.7rem; letter-spacing: 1.5px; color: #ffcf8a; background: rgba(0,0,0,0.3); padding: 4px 12px; border-radius: 30px; display: inline-block; margin-top: 6px; }
    input { width: 100%; padding: 14px 18px; background: rgba(0, 0, 0, 0.55); border: 1px solid rgba(255, 180, 70, 0.5); border-radius: 60px; color: white; font-size: 1rem; outline: none; margin-top: 12px; }
    input:focus { border-color: #FFB347; box-shadow: 0 0 0 2px rgba(255, 180, 70, 0.3); }
    .btn-gold { background: linear-gradient(105deg, #FFA41F, #FF7A00); border: none; padding: 14px 20px; border-radius: 60px; font-weight: bold; font-size: 1rem; color: #0a0c18; cursor: pointer; width: 100%; margin-top: 20px; transition: 0.2s; }
    .btn-outline-light { background: transparent; border: 1px solid #FFA41F; color: #FFD966; padding: 8px 16px; border-radius: 40px; font-weight: 600; cursor: pointer; }
    .error-text { color: #ff8a6e; font-size: 0.8rem; margin-top: 12px; }
    .dashboard { display: none; padding: 1rem 1rem 2rem; }
    .glass-card { background: rgba(8, 12, 28, 0.7); backdrop-filter: blur(14px); border: 1px solid rgba(255, 180, 60, 0.25); border-radius: 1.8rem; padding: 1rem; margin-bottom: 1rem; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; background: rgba(5, 7, 20, 0.7); backdrop-filter: blur(8px); padding: 10px 18px; border-radius: 60px; margin-bottom: 20px; }
    .logo-small { display: flex; align-items: center; gap: 8px; }
    .logo-small span { font-size: 2rem; }
    .logo-small h3 { font-size: 1.3rem; background: linear-gradient(145deg, #FFD966, #FFA123); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .user-area { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.4); padding: 5px 14px; border-radius: 40px; }
    .admin-tag { background: #FF7A2C; color: #0b0b16; font-size: 0.7rem; font-weight: bold; padding: 4px 10px; border-radius: 30px; }
    .script-grid { display: flex; flex-direction: column; gap: 1rem; margin-top: 8px; }
    .script-card { background: rgba(10, 12, 28, 0.8); backdrop-filter: blur(8px); border-radius: 1.5rem; padding: 1rem; border-left: 4px solid #FFA41F; }
    .script-title { font-size: 1.2rem; font-weight: 700; color: #FFE0A3; margin-bottom: 4px; }
    .script-desc { font-size: 0.75rem; color: #b9ceff; margin: 4px 0 10px; }
    .code-area { background: #01010ce0; padding: 10px; border-radius: 1rem; font-family: monospace; font-size: 0.7rem; white-space: pre-wrap; word-break: break-all; max-height: 150px; overflow-y: auto; }
    .card-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 12px; }
    .btn-copy { background: #262d4a; border: none; padding: 6px 14px; border-radius: 40px; color: #ffde9e; cursor: pointer; }
    .btn-delete { background: rgba(200, 60, 50, 0.2); border: 1px solid #ff6a55; color: #ff8f77; padding: 6px 14px; border-radius: 30px; cursor: pointer; }
    .admin-panel { margin-top: 20px; }
    textarea { background: #0c1022; border: 1px solid #ffa41f70; border-radius: 1rem; padding: 12px; color: white; font-family: monospace; font-size: 0.8rem; width: 100%; margin-top: 8px; }
    .flex-btns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e1f2ee6; backdrop-filter: blur(12px); padding: 8px 20px; border-radius: 60px; color: #FFD966; font-size: 0.85rem; z-index: 1000; pointer-events: none; }
    .sync-status { font-size: 0.7rem; color: #7effb3; margin-top: 5px; }
    .btn-refresh { background: #2a5f8a; border: none; padding: 6px 12px; border-radius: 40px; color: white; font-size: 0.7rem; cursor: pointer; margin-left: 10px; }
    .btn-force-sync { background: #c0392b; border: none; padding: 6px 12px; border-radius: 40px; color: white; font-size: 0.7rem; cursor: pointer; margin-left: 10px; }
  </style>
</head>
<body>

<div id="loginScreen" class="login-container">
  <div class="login-card">
    <div class="monkey-logo">🐒</div>
    <div class="brand-name">HGB VN</div>
    <div class="brand-sub">✦ ROBLOX SCRIPT HUB ✦</div>
    <input type="text" id="loginUser" placeholder="Tài khoản" autocomplete="off">
    <input type="password" id="loginPass" placeholder="Mật khẩu">
    <button id="doLogin" class="btn-gold">Đăng nhập</button>
    <div id="loginMsg" class="error-text"></div>
    <div style="margin-top: 18px; font-size: 0.7rem; opacity: 0.7;">🔑 Khách: hgbfree / 123456 &nbsp;|&nbsp; 👑 Admin: hoangbao2k11</div>
  </div>
</div>

<div id="dashboard" class="dashboard">
  <div class="top-bar">
    <div class="logo-small"><span>🐒</span><h3>HGB VN</h3></div>
    <div class="user-area">
      <span id="currentUserName">Khách</span>
      <span id="roleChip" class="admin-tag">👤</span>
      <button id="logoutBtn" class="btn-outline-light" style="padding: 5px 14px;">Thoát</button>
    </div>
  </div>

  <div class="glass-card" style="background: #1f6e5c30; border-color: #1f6e5c;">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;">
      <div>
        <div style="font-weight: 600;">🤖 ĐỒNG BỘ QUA TELEGRAM</div>
        <div style="font-size: 0.7rem;">✅ Dữ liệu đồng bộ tự động</div>
      </div>
      <div style="display: flex; gap: 8px;">
        <button id="manualRefreshBtn" class="btn-refresh">🔄 Làm mới</button>
        <button id="forceSyncBtn" class="btn-force-sync" style="display: none;">📤 Đẩy lên cloud</button>
      </div>
    </div>
    <div id="syncStatus" class="sync-status">🔄 Đang kết nối...</div>
  </div>

  <h3 style="margin: 16px 0 8px;">📜 Kho script Roblox</h3>
  <div id="scriptsList" class="script-grid"></div>

  <div id="adminZone" style="display: none;">
    <div class="glass-card admin-panel">
      <h3>✚ Thêm script mới</h3>
      <input type="text" id="newTitle" placeholder="Tên script">
      <input type="text" id="newDesc" placeholder="Mô tả ngắn">
      <textarea rows="3" id="newCode" placeholder="Dán code Lua vào đây..."></textarea>
      <div class="flex-btns">
        <button id="addScriptBtn" class="btn-gold" style="background: #1f6e5c;">➕ Thêm script</button>
        <button id="toggleLogsBtn" class="btn-outline-light">🗑️ Xem log đã xóa</button>
      </div>
    </div>
    <div id="logPanel" style="display: none;" class="glass-card">
      <div style="display: flex; justify-content: space-between;">
        <strong>📋 Nhật ký script đã xóa</strong>
        <button id="closeLogPanel" style="background: none; border: none; color: #ffb347; font-size: 1.2rem;">✖</button>
      </div>
      <div id="logsContainer" style="max-height: 250px; overflow-y: auto; margin-top: 8px;"></div>
    </div>
  </div>
</div>

<script>
  // ==================== CẤU HÌNH TELEGRAM (CỦA BẠN) ====================
  const TELEGRAM_BOT_TOKEN = "8648061816:AAEIAV6IG48rJi98cVYbFLnFgFDF_-2GcVo";
  const TELEGRAM_CHAT_ID = "-1003667423902";
  
  const STORAGE_SCRIPTS = 'hgb_scripts';
  const STORAGE_LOGS = 'hgb_logs';

  const defaultScripts = [
    { id: "s1", title: "🚀 Auto Farm & Collect", description: "Farm tự động", code: "-- Auto Farm Universal\nlocal player = game.Players.LocalPlayer" },
    { id: "s2", title: "✨ Hub All Game", description: "Orion/Dex Hub", code: "-- Load Hub\nloadstring(game:HttpGet('https://example.com/hub'))()" }
  ];

  function loadLocal(key, def) {
    let s = localStorage.getItem(key);
    if (!s) return def;
    try { return JSON.parse(s); } catch(e) { return def; }
  }
  function saveLocal(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

  let currentRole = null;
  let currentUser = '';
  let syncInterval = null;

  // ==================== ĐỒNG BỘ QUA TELEGRAM ====================
  async function syncToTelegram() {
    const statusDiv = document.getElementById('syncStatus');
    if (statusDiv) statusDiv.innerText = "☁️ Đang đẩy lên Telegram...";
    
    const data = {
      scripts: loadLocal(STORAGE_SCRIPTS, defaultScripts),
      logs: loadLocal(STORAGE_LOGS, []),
      lastUpdate: Date.now()
    };
    
    const jsonStr = JSON.stringify(data);
    
    try {
      const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: TELEGRAM_CHAT_ID,
          text: `HGB_DATA:${jsonStr}`,
          parse_mode: 'HTML'
        })
      });
      
      const result = await response.json();
      
      if (result.ok) {
        if (statusDiv) statusDiv.innerText = "✅ Đã đẩy lên Telegram!";
        showToast("✅ Đã đẩy dữ liệu lên cloud!");
        setTimeout(() => {
          if (statusDiv && statusDiv.innerText === "✅ Đã đẩy lên Telegram!") 
            statusDiv.innerText = "☁️ Đã kết nối Telegram";
        }, 2000);
        return true;
      } else {
        console.error("Telegram error:", result);
        if (statusDiv) statusDiv.innerText = "⚠️ Lỗi: " + (result.description || "Không gửi được");
        showToast("❌ Lỗi: " + (result.description || "Kiểm tra bot và channel"));
        return false;
      }
    } catch(e) {
      console.error("Sync error:", e);
      if (statusDiv) statusDiv.innerText = "⚠️ Lỗi kết nối!";
      showToast("❌ Lỗi kết nối mạng!");
      return false;
    }
  }

  async function syncFromTelegram(showToastMsg = false) {
    const statusDiv = document.getElementById('syncStatus');
    if (statusDiv) statusDiv.innerText = "🔄 Đang tải từ Telegram...";
    
    try {
      const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?limit=50`;
      const response = await fetch(url);
      const result = await response.json();
      
      if (result.ok && result.result) {
        let latestData = null;
        for (let i = result.result.length - 1; i >= 0; i--) {
          const update = result.result[i];
          const text = update.channel_post?.text || update.message?.text;
          if (text && text.startsWith('HGB_DATA:')) {
            latestData = text.substring(9);
            break;
          }
        }
        
        if (latestData) {
          const data = JSON.parse(latestData);
          if (data.scripts) saveLocal(STORAGE_SCRIPTS, data.scripts);
          if (data.logs) saveLocal(STORAGE_LOGS, data.logs);
          if (statusDiv) statusDiv.innerText = "✅ Đã tải dữ liệu mới!";
          renderScripts();
          if (currentRole === 'admin') renderLogs();
          if (showToastMsg) showToast("✅ Đã cập nhật dữ liệu từ cloud!");
          return true;
        } else {
          if (statusDiv) statusDiv.innerText = "📭 Chưa có dữ liệu trên cloud";
          if (showToastMsg) showToast("📭 Chưa có dữ liệu. Admin hãy đẩy lên cloud trước!");
          return false;
        }
      }
    } catch(e) {
      console.error("Pull error:", e);
      if (statusDiv) statusDiv.innerText = "⚠️ Lỗi kết nối!";
      return false;
    }
  }

  // ==================== GIAO DIỆN ====================
  function renderScripts() {
    const scripts = loadLocal(STORAGE_SCRIPTS, defaultScripts);
    const container = document.getElementById('scriptsList');
    if (!container) return;
    if (scripts.length === 0) {
      container.innerHTML = `<div style="background: rgba(0,0,0,0.4); border-radius: 1rem; padding: 2rem; text-align: center;">✨ Chưa có script nào. Admin hãy thêm nhé!</div>`;
      return;
    }
    let html = '';
    scripts.forEach(script => {
      const isAdmin = (currentRole === 'admin');
      html += `
        <div class="script-card">
          <div class="script-title">${escapeHtml(script.title)}</div>
          <div class="script-desc">📌 ${escapeHtml(script.description)}</div>
          <div class="code-area"><pre style="margin:0;">${escapeHtml(script.code)}</pre></div>
          <div class="card-buttons">
            <button class="btn-copy copy-btn" data-code="${escapeHtml(script.code).replace(/"/g, '&quot;')}">📋 Sao chép</button>
            ${isAdmin ? `<button class="btn-delete delete-script" data-id="${script.id}">🗑️ Xóa</button>` : ''}
          </div>
        </div>
      `;
    });
    container.innerHTML = html;

    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const code = btn.getAttribute('data-code');
        if (code) {
          try {
            await navigator.clipboard.writeText(code);
            showToast("✅ Đã sao chép script!");
          } catch(e) {
            const textarea = document.createElement('textarea');
            textarea.value = code;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast("✅ Đã sao chép");
          }
        }
      });
    });

    if (currentRole === 'admin') {
      document.querySelectorAll('.delete-script').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const id = btn.getAttribute('data-id');
          if (!id) return;
          let scripts = loadLocal(STORAGE_SCRIPTS, defaultScripts);
          const scriptToDel = scripts.find(s => s.id === id);
          if (scriptToDel && confirm(`Xóa "${scriptToDel.title}"?`)) {
            let logs = loadLocal(STORAGE_LOGS, []);
            logs.unshift({
              title: scriptToDel.title,
              description: scriptToDel.description,
              deletedAt: new Date().toLocaleString('vi-VN'),
              deletedBy: currentUser
            });
            if (logs.length > 50) logs.pop();
            saveLocal(STORAGE_LOGS, logs);
            const newScripts = scripts.filter(s => s.id !== id);
            saveLocal(STORAGE_SCRIPTS, newScripts);
            renderScripts();
            if (currentRole === 'admin') renderLogs();
            await syncToTelegram();
            showToast(`🗑️ Đã xóa "${scriptToDel.title}"`);
          }
        });
      });
    }
  }

  function renderLogs() {
    const logs = loadLocal(STORAGE_LOGS, []);
    const container = document.getElementById('logsContainer');
    if (!container) return;
    if (logs.length === 0) {
      container.innerHTML = '<div>📭 Chưa có script nào bị xóa.</div>';
      return;
    }
    let html = '';
    logs.forEach(log => {
      html += `<div style="border-bottom:1px solid #ffb34730; padding:8px 0;"><strong>🗑️ ${escapeHtml(log.title)}</strong><br>📄 ${escapeHtml((log.description || '').substring(0, 80))}<br>⏱️ ${log.deletedAt} — bởi ${log.deletedBy}</div>`;
    });
    container.innerHTML = html;
  }

  async function addNewScript() {
    if (currentRole !== 'admin') { showToast("Chỉ admin mới thêm được"); return; }
    const title = document.getElementById('newTitle').value.trim();
    const desc = document.getElementById('newDesc').value.trim();
    const code = document.getElementById('newCode').value.trim();
    if (!title || !code) { showToast("Nhập tên và code script"); return; }
    const scripts = loadLocal(STORAGE_SCRIPTS, defaultScripts);
    scripts.push({
      id: 'scr_' + Date.now() + '_' + Math.floor(Math.random() * 10000),
      title: title,
      description: desc || "Không có mô tả",
      code: code
    });
    saveLocal(STORAGE_SCRIPTS, scripts);
    renderScripts();
    document.getElementById('newTitle').value = '';
    document.getElementById('newDesc').value = '';
    document.getElementById('newCode').value = '';
    await syncToTelegram();
    showToast("✨ Thêm script thành công! Đã đẩy lên cloud.");
  }

  function showToast(msg) {
    let existing = document.querySelector('.toast');
    if (existing) existing.remove();
    let div = document.createElement('div');
    div.className = 'toast';
    div.innerText = msg;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 3000);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
  }

  // ==================== ĐĂNG NHẬP ====================
  function attemptLogin(username, password) {
    if (username === 'hgbfree' && password === '123456') {
      currentRole = 'guest';
      currentUser = 'hgbfree';
      initDashboard();
      return true;
    }
    if (username === 'hoangbao2k11' && password === 'bao@20TN') {
      currentRole = 'admin';
      currentUser = 'hoangbao2k11';
      initDashboard();
      return true;
    }
    return false;
  }

  function initDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('currentUserName').innerText = currentUser;
    const roleChip = document.getElementById('roleChip');
    const adminZone = document.getElementById('adminZone');
    const forceSyncBtn = document.getElementById('forceSyncBtn');
    
    if (currentRole === 'admin') {
      roleChip.innerText = '👑 ADMIN';
      roleChip.style.background = '#FF7A2C';
      adminZone.style.display = 'block';
      forceSyncBtn.style.display = 'inline-block';
      document.getElementById('addScriptBtn').onclick = addNewScript;
      document.getElementById('toggleLogsBtn').onclick = () => {
        const panel = document.getElementById('logPanel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        if (panel.style.display === 'block') renderLogs();
      };
      document.getElementById('closeLogPanel').onclick = () => document.getElementById('logPanel').style.display = 'none';
      document.getElementById('logPanel').style.display = 'none';
      forceSyncBtn.onclick = async () => { await syncToTelegram(); };
    } else {
      roleChip.innerText = '👤 Khách (copy)';
      roleChip.style.background = '#2c2f48';
      adminZone.style.display = 'none';
      forceSyncBtn.style.display = 'none';
    }
    renderScripts();
    
    if (syncInterval) clearInterval(syncInterval);
    syncInterval = setInterval(async () => { await syncFromTelegram(false); }, 15000);
  }

  function logout() {
    if (syncInterval) clearInterval(syncInterval);
    currentRole = null;
    currentUser = '';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
    document.getElementById('loginMsg').innerText = '';
  }

  function onLoginClick() {
    const username = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPass').value.trim();
    const errDiv = document.getElementById('loginMsg');
    if (!username || !password) {
      errDiv.innerText = "Nhập đầy đủ tài khoản/mật khẩu";
      return;
    }
    if (!attemptLogin(username, password)) {
      errDiv.innerText = "Sai tài khoản hoặc mật khẩu!";
    }
  }

  window.addEventListener('DOMContentLoaded', async () => {
    if (!localStorage.getItem(STORAGE_SCRIPTS)) saveLocal(STORAGE_SCRIPTS, defaultScripts);
    if (!localStorage.getItem(STORAGE_LOGS)) saveLocal(STORAGE_LOGS, []);

    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';

    await syncFromTelegram(true);

    document.getElementById('doLogin').addEventListener('click', onLoginClick);
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('manualRefreshBtn').addEventListener('click', async () => { await syncFromTelegram(true); });
    document.getElementById('loginPass').addEventListener('keypress', (e) => { if (e.key === 'Enter') onLoginClick(); });
  });
</script>
</body>
</html>
